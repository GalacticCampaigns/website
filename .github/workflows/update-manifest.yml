name: Update Campaign Registry
on:
  repository_dispatch:
    types: [update-logs]
  workflow_dispatch:
    inputs:
      campaign_id:
        description: 'Slug of campaign to update (e.g., forgotten_ones)'
        required: false
        default: ''
      debug_mode:
        description: 'Enable extended logging'
        required: false
        type: boolean
        default: false

jobs:
  update-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run Hydrator
        shell: pwsh
        run: |
          # 1. Resolve Campaign ID (Check payload first, then manual input)
          $id = "${{ github.event.client_payload.campaign_id }}"
          if ([string]::IsNullOrWhiteSpace($id)) { $id = "${{ github.event.inputs.campaign_id }}" }

          # 2. Resolve Debug Mode (Check manual toggle first, then payload)
          $debug = "${{ github.event.inputs.debug_mode }}" -eq "true"
          if (-not $debug) { $debug = "${{ github.event.client_payload.debug_mode }}" -eq "true" }

          # 3. Build Parameter Hash (Splatting)
          $params = @{}
          if (-not [string]::IsNullOrWhiteSpace($id)) { $params["CampaignId"] = $id }
          if ($debug) { $params["DebugLog"] = $true }

          Write-Host "Running hydrator with CampaignId: $($id) | Debug: $($debug)"
          
          # 4. Execute Script
          ./.github/workflows/scripts/manifest-gen.ps1 @params

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/campaign-registry.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-hydrate [skip ci]"
            git push origin main
          fi
