---
layout: default
---

<style>
/* 1. CONTAINER & STICKY STABILIZATION */
.log-container-json { 
    width: 100%; 
    max-width: 900px; 
    margin: 0 auto; 
    padding-top: 20px;
    overflow: visible !important; 
}
#chapter-picker {
    flex: 1; /* Grow to fill center space */
    min-width: 0; /* Allows the select to shrink smaller than its text content */
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
}

/* --- 2. SECONDARY FREQUENCY BAR --- */
.frequency-nav-bar { 
    position: sticky; 
    top: calc(var(--site-nav-height) + var(--log-nav-height)); 
    z-index: 7000; 
    background: var(--secondary-bg);
    border-bottom: 1px solid var(--gh-border);
    padding: 12px 0;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    display: none;
}

.freq-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 15px;
}

.freq-btn {
    padding: 6px 12px;
    background: #1c2128;
    border: 1px solid var(--gh-border);
    color: var(--gh-text);
    border-radius: 4px;
    font-size: 0.7rem;
    cursor: pointer;
    font-family: monospace;
}

.freq-btn.active {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(88,166,255,0.1);
}

.comms-status { 
    width: 100%; 
    padding-bottom: 8px; 
    font-size: 0.6rem; 
    color: var(--sw-yellow); 
    font-family: monospace; 
    text-transform: uppercase; 
    border-bottom: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 5px;
}

/* 3. MESSAGE FEED STYLING */
.message-group { 
    display: flex; 
    padding: 15px 10px; 
    border-bottom: 1px solid rgba(48, 54, 61, 0.2); 
    transition: background 0.3s; 
}

.avatar-container { 
    width: 42px; 
    height: 42px; 
    margin-right: 15px; 
    flex-shrink: 0; 
    background: #1c2128; 
    border-radius: 4px; 
    overflow: hidden; 
}

.avatar { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    opacity: 0; 
    transition: opacity 0.3s; 
}

.avatar.loaded { opacity: 1; }

.msg-body { flex-grow: 1; min-width: 0; }
.username { color: var(--accent-blue); font-weight: bold; margin-right: 10px; }
.msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.timestamp { font-size: 0.75rem; color: var(--text-muted); }
.copy-link-icon { text-decoration: none; font-size: 0.8rem; opacity: 0.3; transition: 0.2s; }
.copy-link-icon:hover { opacity: 1; }

/* 4. TRANSITIONS & HIGHLIGHTS */
.channel-transition { 
    display: flex; align-items: center; justify-content: center; 
    margin: 40px 0 20px; padding: 15px; 
    background: rgba(88,166,255,0.05); border: 1px dashed var(--accent-blue); 
    color: var(--accent-blue); font-family: monospace; font-size: 0.75rem; 
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer; 
}

.channel-link {
    color: var(--sw-yellow);
    text-decoration: none;
    background: rgba(255, 193, 7, 0.05);
    padding: 0 4px;
    border-radius: 3px;
    border-bottom: 1px dashed var(--sw-yellow);
    font-family: monospace;
    font-size: 0.9em;
}

.channel-link:hover {
    background: var(--sw-yellow);
    color: var(--primary-bg);
}

.message-group:target, .highlight-flash { 
    background: rgba(210, 153, 34, 0.15) !important; 
    border-left: 3px solid var(--sw-yellow); 
}

/* 5. MOBILE OVERRIDES */
@media (max-width: 900px) {
    .log-container-json { 
        padding: 5px; 
    }
    
    /* Logic: Site Nav (50px) + Mobile Frozen Nav (60px) = 110px. 
       This ensures the Frequency Bar anchors perfectly to the bottom of the chapter picker.
    */
    .frequency-nav-bar { 
        top: 110px; 
    } 
}

</style>

<header class="frozen-nav">
    <div class="nav-inner">
        <a href="javascript:void(0)" id="back-to-archives" class="toc-open-btn" style="text-decoration: none;">⇠</a>
        <select id="chapter-picker" class="toc-open-btn" onchange="onPickerChange(this.value)" style="background: #1c2128; flex-grow: 1; min-width: 0;">
            <option value="">-- LOADING DATAPAD --</option>
        </select>
        <button id="thread-toggle" class="toc-open-btn" onclick="toggleFrequencies()" style="display:none;">📡</button>
    </div>
</header>

<div id="frequency-selector" class="frequency-nav-bar">
    <div class="freq-container" id="freq-buttons-target"></div>
</div>

<div class="log-container-json">
    <div id="viewer-output">{{ content }}</div>
</div>

<script>
let registry = null;
let activeCampaign = null;
let campaignSlug = "";
let fullData = [];
let channelMap = {}; 
let mainChannelId = null;
let remoteBase = "";

async function init() {
    try {
        const res = await fetch("{{ '/assets/campaign-registry.json' | relative_url }}");
        registry = await res.json();
        const params = new URLSearchParams(window.location.search);
        campaignSlug = params.get('c') || registry.activeCampaign;
        activeCampaign = registry.campaigns[campaignSlug];

        if (!activeCampaign) throw new Error("Unknown Campaign ID.");

        remoteBase = `https://raw.githubusercontent.com/${activeCampaign.repository}/${activeCampaign.branch}/${activeCampaign.dataPath}`;
        document.getElementById('back-to-archives').href = `{{ '/archives' | relative_url }}?c=${campaignSlug}`;

        const picker = document.getElementById('chapter-picker');
        picker.innerHTML = ""; 

        activeCampaign.logs.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.channelID;
            opt.textContent = item.title; 
            picker.appendChild(opt);
        });

        const hash = window.location.hash.substring(1);
        const hashParts = hash.split(':');
        const chanId = hashParts[0];
        const msgId = hashParts[1]; // Extract msgId if present

        if (chanId) {
            const entry = activeCampaign.logs.find(m => m.channelID === chanId);
            if (entry) {
                picker.value = chanId;
                // Pass both IDs to loadChapter
                await loadChapter(chanId, msgId); 
                return;
            }
        }


        if (activeCampaign.logs.length > 0) {
            picker.value = activeCampaign.logs[0].channelID;
            loadChapter(activeCampaign.logs[0].channelID);
        }
    } catch (e) {
        console.error("Init Error:", e);
        document.getElementById('viewer-output').innerHTML = `<b style="color:red">COMMS ERROR: ${e.message}</b>`;
    }
}

async function loadChapter(channelID, targetMsg = null) {
    const logEntry = activeCampaign.logs.find(l => l.channelID === channelID);
    if (!logEntry) return;

    const jsonUrl = `${remoteBase}${activeCampaign.paths.json}${logEntry.fileName}`;
    const output = document.getElementById('viewer-output');
    output.innerHTML = "<em>Decrypting Data Stream...</em>";

    try {
        const response = await fetch(jsonUrl);
        const data = await response.json();
        fullData = Array.isArray(data) ? data : (data.messages || []);

        fullData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        // ... [Keep your channelMap/mainChannelId logic here] ...

        buildFrequencyBar();
        
        // 1. Render the feed
        renderFeed('all');

        // 2. Resolve the jump with a slight delay to ensure DOM paint
        if (targetMsg) {
            if (EnableDebugMode) console.log(`[DEBUG] Attempting jump to: ${targetMsg}`);
            // Use requestAnimationFrame for better timing than a flat setTimeout
            requestAnimationFrame(() => {
                setTimeout(() => jumpToMessage(targetMsg), 300);
            });
        } else {
            window.scrollTo(0, 0);
        }
    } catch (err) {
        output.innerHTML = `<b style="color:red">DATA CORRUPTION: ${err.message}</b>`;
    }
}

function renderFeed(filterId) {
    const output = document.getElementById('viewer-output');
    output.innerHTML = "";
    let lastChannelId = null;

    const validTypes = [0, 19];
    const filteredMessages = fullData.filter(m => validTypes.includes(m.type));
    const messages = filterId === 'all' ? filteredMessages : filteredMessages.filter(m => m.channel_id === filterId || (m.thread && m.thread.id === filterId));

    const currentChapterId = document.getElementById('chapter-picker').value;
    const hash = filterId === 'all' ? currentChapterId : `${currentChapterId}:${filterId}`;
    history.replaceState(null, null, `?c=${campaignSlug}#${hash}`);

    messages.forEach(msg => {
        const isThreadStarter = (msg.thread && msg.thread.id === mainChannelId);
        const actualChannel = isThreadStarter ? msg.thread.id : msg.channel_id;

        if (filterId === 'all' && lastChannelId !== null && actualChannel !== lastChannelId && !isThreadStarter) {
            const shiftName = channelMap[actualChannel] || "PRIMARY FREQUENCY";
            const transition = document.createElement('div');
            transition.className = 'channel-transition';
            transition.innerHTML = `📡 FREQUENCY SHIFT >> ${shiftName}`;
            transition.onclick = () => {
                renderFeed(actualChannel);
                window.scrollTo(0,0);
            };
            output.appendChild(transition);
        }
        if (!isThreadStarter) lastChannelId = actualChannel;

        const group = document.createElement('div');
        group.className = 'message-group';
        group.id = `msg-${msg.id}`;

        const logEntry = activeCampaign.logs.find(l => l.channelID === msg.channel_id) || 
                         activeCampaign.logs.find(l => l.threads.some(t => t.threadID === msg.channel_id));

        const attachmentHtml = renderAttachments(msg, logEntry);

        const avatarUrl = msg.author.avatar 
            ? `${remoteBase}${activeCampaign.paths.avatars}${msg.author.id}/${msg.author.avatar}.png` 
            : `${remoteBase}${activeCampaign.paths.avatars}default.png`;

        group.innerHTML = `
            <div class="avatar-container">
                <img src="" data-src="${avatarUrl}" class="avatar lazy-load">
            </div>
            <div class="msg-body">
                <div class="msg-header">
                    <span class="username">${msg.author.nickname || msg.author.global_name || msg.author.username}</span>
                    <span class="timestamp">${new Date(msg.timestamp).toLocaleString()}</span>
                    <a href="javascript:void(0)" class="copy-link-icon" onclick="copyMsgLink(event, '${msg.id}', '${actualChannel}')">🔗</a>
                </div>
                <div class="msg-content">${parseMarkdown(msg.content)}</div>
                ${attachmentHtml} 
            </div>
        `;
        output.appendChild(group);
    });
    silentLoadAvatars();
}

function parseMarkdown(text) {
    if (!text) return "";
    
    // Initial escape
    let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    
    // Construct base path for emojis
    const emojiBase = `${remoteBase}${activeCampaign.paths.emoji}`;

    return html
        /* --- 1. Discord Custom Emojis (!name!_id format) --- */
        .replace(/&lt;a?(:.*?:)(\d+)&gt;/g, (match, name, id) => {
            const cleanName = name.replace(/:/g, '');
            // Correct format: !name!_id.png
            return `<img src="${emojiBase}!${cleanName}!_${id}.png" class="emoji" title="${cleanName}">`;
        })

        /* --- 2. Discord Channel/Post References <#ID> --- */
        .replace(/&lt;#(\d+)&gt;/g, (match, id) => {
            const location = resolveDiscordReference(id);
            let targetSlug = campaignSlug;
            let found = false;
            for (let s in registry.campaigns) {
                if (registry.campaigns[s].logs.some(l => l.channelID === id || l.threads.some(t => t.threadID === id))) {
                    targetSlug = s;
                    found = true;
                    break;
                }
            }
            const href = found ? `{{ '/logs' | relative_url }}?c=${targetSlug}#${id}` : "javascript:void(0)";
            return `<a href="${href}" class="channel-link"># ${location} <span style="font-size:0.8em">✉️</span></a>`;
        })

        /* --- 3. External Links Handling --- */
        // Handles: [Text](<https://link>) and [Text](https://link)
        .replace(/\[(.*?)\]\(&lt;?(https?:\/\/[^\s&gt;]+?)&gt;?\)/g, (match, label, url) => {
            return `<a href="${url}" target="_blank" class="external-link">${label}</a>`;
        })

        /* --- 4. Headers (h1 - h6) --- */
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^#### (.*$)/gim, '<h4>$1</h4>')
        .replace(/^##### (.*$)/gim, '<h5>$1</h5>')
        .replace(/^###### (.*$)/gim, '<h6>$1</h6>')
        .replace(/^-# (.*$)/gim, '<small class="subtext">$1</small>')

        /* --- 5. Formatting --- */
        .replace(/`(.*?)`/g, '<code>$1</code>')
        .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><i>$1</strong></i>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<i>$1</i>')
        .replace(/\|\|(.*?)\|\|/g, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>')
        .replace(/\n/g, '<br>');
}


function resolveDiscordReference(refId) {
    if (channelMap[refId]) return channelMap[refId];

    const localMatch = activeCampaign.logs.find(l => l.channelID === refId);
    if (localMatch) return localMatch.title;

    for (let log of activeCampaign.logs) {
        const threadMatch = log.threads.find(t => t.threadID === refId);
        if (threadMatch) return `${log.title} > ${threadMatch.displayName}`;
    }

    for (let slug in registry.campaigns) {
        if (slug === campaignSlug) continue;
        const camp = registry.campaigns[slug];
        const globalMatch = camp.logs.find(l => l.channelID === refId);
        if (globalMatch) return `${camp.name} > ${globalMatch.title}`;

        for (let log of camp.logs) {
            const gThread = log.threads.find(t => t.threadID === refId);
            if (gThread) return `${camp.name} > ${log.title} > ${gThread.displayName}`;
        }
    }
    return "Unknown Frequency";
}

function renderAttachments(msg, logEntry) {
    if (!msg.attachments || msg.attachments.length === 0 || !logEntry) return "";

    let html = '<div class="msg-attachments">';
    msg.attachments.forEach(att => {
        const folderName = logEntry.fileName.replace('.json', '');
        const localSrc = `${remoteBase}${activeCampaign.paths.media}${folderName}/${att.filename}`;

        if (att.content_type && att.content_type.startsWith('image/')) {
            html += `
                <div class="attachment-item">
                    <a href="${localSrc}" target="_blank">
                        <img src="${localSrc}" class="log-image" loading="lazy" alt="Attachment">
                    </a>
                </div>`;
        } else {
            html += `
                <div class="attachment-item">
                    <a href="${localSrc}" target="_blank" class="file-link">
                        📄 Download ${att.filename}
                    </a>
                </div>`;
        }
    });
    html += '</div>';
    return html;
}

function copyMsgLink(event, msgId, chanId) {
    event.preventDefault();
    const chapterId = document.getElementById('chapter-picker').value;
    const url = `${window.location.origin}${window.location.pathname}?c=${campaignSlug}#${chapterId}:${msgId}`;
    navigator.clipboard.writeText(url).then(() => {
        const icon = event.target;
        icon.innerText = "CHECK";
        setTimeout(() => icon.innerText = "🔗", 1000);
    });
}

function onPickerChange(chanId) {
    loadChapter(chanId);
}

function toggleFrequencies() {
    const bar = document.getElementById('frequency-selector');
    bar.style.display = (bar.style.display === 'none' || bar.style.display === '') ? 'block' : 'none';
}

function buildFrequencyBar() {
    const bar = document.getElementById('frequency-selector');
    const target = document.getElementById('freq-buttons-target');
    const toggleBtn = document.getElementById('thread-toggle');
    const uniqueChannels = [...new Set(fullData.map(m => m.channel_id))].filter(id => id !== mainChannelId);

    if (uniqueChannels.length === 0) { 
        bar.style.display = 'none'; 
        toggleBtn.style.display = 'none'; 
        return; 
    }

    toggleBtn.style.display = 'block';
    let html = `<div class="comms-status">📡 Encrypted Frequencies Detected:</div>`;
    html += `<button class="freq-btn" onclick="renderFeed('all')">COMBINED FEED</button>`;
    uniqueChannels.forEach(id => {
        html += `<button class="freq-btn" onclick="renderFeed('${id}')">${channelMap[id] || "SUB-CHANNEL"}</button>`;
    });
    target.innerHTML = html;
}

function jumpToMessage(msgId) {
    if (!msgId) return;
    
    // Support both raw Snowflake and prefixed ID
    const cleanId = msgId.startsWith('msg-') ? msgId : `msg-${msgId}`;
    const target = document.getElementById(cleanId);
    
    if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.classList.add('highlight-flash');
        setTimeout(() => target.classList.remove('highlight-flash'), 3000);
    } else {
        console.warn(`[HOLONET] Target signal ${cleanId} not found in current sector.`);
    }
}

function silentLoadAvatars() {
    document.querySelectorAll('.lazy-load').forEach(img => {
        const realSrc = img.getAttribute('data-src');
        const probe = new Image();
        probe.src = realSrc;
        probe.onload = () => { img.src = realSrc; img.classList.add('loaded'); };
        probe.onerror = () => { img.src = `${remoteBase}${activeCampaign.paths.avatars}default.png`; img.classList.add('loaded'); };
    });
}

document.addEventListener("DOMContentLoaded", init);
</script>
