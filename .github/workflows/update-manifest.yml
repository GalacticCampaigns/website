name: Update Campaign Registry
on:
  push:
    branches:
      - main
    paths:
      - 'assets/campaign-registry.json'
  repository_dispatch:
    types: [update-logs]
  workflow_dispatch:
    inputs:
      campaign_id:
        description: 'Slug of campaign to update (e.g., forgotten_ones)'
        required: false
        default: ''

jobs:
  update-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run Hydrator
        shell: pwsh
        run: |
          $id = "${{ github.event.client_payload.campaign_id }}"
          if ([string]::IsNullOrWhiteSpace($id)) { $id = "${{ github.event.inputs.campaign_id }}" }
          
          # Added -DebugLog flag here
          if (-not [string]::IsNullOrWhiteSpace($id)) {
             ./.github/workflows/scripts/manifest-gen.ps1 -CampaignId $id -DebugLog
          } else {
             ./.github/workflows/scripts/manifest-gen.ps1 -DebugLog
          }
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/campaign-registry.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-hydrate [skip ci]"
            git push origin main

          fi
