<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Galactic Campaigns</title>
    <link rel="icon" type="image/png" href="{{ '/assets/gc_logo.png' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}"> 

<style>
/* 1. BRANDING & SECRET SELECTOR */
.campaign-selector-wrapper { display: flex; align-items: center; position: relative; }
.nav-brand {
    font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase;
    color: var(--accent-blue) !important; text-decoration: none; transition: 0.3s;
}
.selector-container { position: relative; display: inline-flex; align-items: center; margin-left: 8px; }
#campaign-dropdown { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
.selector-arrow { color: var(--sw-yellow); font-size: 0.8rem; pointer-events: none; z-index: 1; transition: 0.2s; }

/* 2. HERO SECTION */
.hero-section {
    text-align: center; padding: 60px 20px; border-bottom: 1px solid var(--gh-border);
    background: radial-gradient(circle at center, rgba(13, 17, 23, 0.5) 0%, var(--primary-bg) 100%);
}
.site-logo { max-height: 150px; filter: drop-shadow(0 0 20px rgba(97, 218, 251, 0.15)); }
.flavor-text { color: var(--sw-yellow); font-style: italic; margin-top: 20px; font-family: monospace; font-size: 0.85rem; }

/* 3. FOOTER */
.site-footer {
    margin-top: 80px; padding: 40px 20px; text-align: center;
    border-top: 1px solid var(--gh-border); font-size: 0.8rem;
    color: var(--text-muted); background: rgba(13, 17, 23, 0.3);
}

@media (max-width: 900px) {
    .hero-section { padding: 40px 15px; }
    .site-logo { max-height: 100px; }
}
</style>


</head>
<body>

<nav class="site-nav">
    <div class="nav-inner" style="display:flex; width:100%; align-items:center; justify-content: space-between;">
        
        <div class="campaign-selector-wrapper">
            <a href="{{ '/' | relative_url }}" id="nav-brand-text" class="nav-brand">Galactic Campaigns</a>
            
            <div class="selector-container">
                <select id="campaign-dropdown" onchange="switchCampaign(this.value)">
                    <option value="" disabled selected></option>
                    <option value="hub">-- Global Hub --</option>
                    </select>
                <span class="selector-arrow">▼</span>
            </div>
        </div>

        <div class="nav-links" id="dynamic-nav-links">
            <a href="{{ '/' | relative_url }}" id="hub-home">Home</a>
            <a href="#" id="nav-archives" class="campaign-link">Archives</a>
            <a href="#" id="nav-wiki" class="campaign-link" target="_blank">Wiki</a>
        </div>
    </div>
</nav>

<header class="hero-section" style="text-align: center; padding: 40px 20px;">
    <div class="container-hero">
        <img src="{{ '/assets/gc_banner.png' | relative_url }}" alt="Logo" id="site-logo" class="site-logo" style="max-height: 150px; width: auto;">
        <p id="flavor-text" class="flavor-text" style="color: var(--sw-yellow); font-style: italic; margin-top: 15px;">
            Select a frequency to begin decryption.
        </p>
    </div>
</header>

<main> 
    {{ content }}
</main>

<footer style="margin-top: 80px; padding: 40px 20px; text-align: center; border-top: 1px solid var(--gh-border); font-size: 0.8rem; color: var(--text-muted);">
    <div style="margin-bottom: 15px; display: flex; justify-content: center; gap: 20px;">
        <a href="{{ '/PrivacyPolicy' | relative_url }}" style="color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s;" onmouseover="this.style.borderColor='var(--accent-blue)'" onmouseout="this.style.borderColor='transparent'">Privacy Policy</a>
        <a href="{{ '/TermsofService' | relative_url }}" style="color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s;" onmouseover="this.style.borderColor='var(--accent-blue)'" onmouseout="this.style.borderColor='transparent'">Terms of Service</a>
    </div>
    <p>Logged into Galactic Registry Engine v3.0</p>
    <p>Last Data Sync: {{ site.time | date: "%Y-%m-%d %H:%M:%S" }} UTC</p>
</footer>

<script>
    // Bridge Jekyll variables to External JS
    window.site_baseurl = "{{ '' | relative_url }}";
</script>
<script src="{{ '/assets/js/navigation.js' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M' }}"></script>
<script>
function switchCampaign(slug) {
    const url = (slug === "hub" || !slug) ? window.site_baseurl + "/" : window.site_baseurl + "/?c=" + slug;
    window.location.href = url;
}

document.addEventListener("DOMContentLoaded", updateGlobalNav);
</script>

</body>
</html>
