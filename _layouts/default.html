<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Galactic Campaigns</title>
    <link rel="icon" type="image/png" href="{{ '/assets/gc_logo.png' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}"> 

    <style>
        /* 1. CAMPAIGN SELECTOR & BRANDING */
        .campaign-selector-wrapper { 
            display: flex; 
            align-items: center; 
            position: relative;
        }

        .nav-brand {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue) !important;
            text-decoration: none;
            white-space: nowrap;
            transition: text-shadow 0.3s ease;
        }

        .nav-brand:hover {
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.4);
        }

        /* 2. THE SECRET SELECTOR (The Name is the Menu) */
        .selector-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            margin-left: 8px;
        }

        #campaign-dropdown {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0; /* Fully invisible but covers the arrow for clicking */
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            z-index: 2;
        }

        /* The decorative arrow next to the name */
        .selector-arrow {
            color: var(--sw-yellow);
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 1;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .selector-container:hover .selector-arrow {
            color: var(--accent-blue);
            transform: translateY(1px);
        }

        /* 3. DYNAMIC NAV LINKS */
        .campaign-link { 
            display: none; /* Controlled by applyCampaignContext() in JS */
        }

        /* 4. HERO & HEADER SECTION */
        .hero-section {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid var(--gh-border);
            background: radial-gradient(circle at center, rgba(13, 17, 23, 0.5) 0%, var(--primary-bg) 100%);
        }

        .site-logo {
            max-height: 150px;
            width: auto;
            filter: drop-shadow(0 0 20px rgba(97, 218, 251, 0.15));
            transition: filter 0.5s ease;
        }

        .site-logo:hover {
            filter: drop-shadow(0 0 25px rgba(97, 218, 251, 0.3));
        }

        .flavor-text {
            color: var(--sw-yellow);
            font-style: italic;
            margin-top: 20px;
            font-family: monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* 5. FOOTER STYLING */
        .site-footer {
            margin-top: 80px;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid var(--gh-border);
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(13, 17, 23, 0.3);
        }

        /* 6. RESPONSIVE ADJUSTMENTS */
        /* --- HERO & BRAND MOBILE TRANSITION --- */
@media (max-width: 900px) {
    /* Reduce hero padding to save vertical space on tablets/phones */
    .hero-section { 
        padding: 40px 15px; 
    }

    /* Shrink the logo to prevent excessive scrolling */
    .site-logo { 
        max-height: 100px; 
    }

    /* Note: .nav-brand font-size is now handled by style.css 
       to ensure the 900px row-locking logic is consistent. 
    */
}

/* Portrait-specific centering for Hero logos (per SOP) */
@media (max-width: 600px) and (orientation: portrait) {
    .site-logo {
        width: 90%;
        max-width: 320px;
    }
    
    .flavor-text {
        font-size: 0.75rem;
        padding: 0 10px;
    }
}

    </style>

</head>
<body>

<nav class="site-nav">
    <div class="nav-inner" style="display:flex; width:100%; align-items:center; justify-content: space-between;">
        
        <div class="campaign-selector-wrapper">
            <a href="{{ '/' | relative_url }}" id="nav-brand-text" class="nav-brand">Galactic Campaigns</a>
            
            <div class="selector-container">
                <select id="campaign-dropdown" onchange="switchCampaign(this.value)">
                    <option value="" disabled selected></option>
                    <option value="hub">-- Global Hub --</option>
                    </select>
                <span class="selector-arrow">▼</span>
            </div>
        </div>

        <div class="nav-links" id="dynamic-nav-links">
            <a href="{{ '/' | relative_url }}" id="hub-home">Home</a>
            <a href="#" id="nav-archives" class="campaign-link">Archives</a>
            <a href="#" id="nav-wiki" class="campaign-link" target="_blank">Wiki</a>
        </div>
    </div>
</nav>

<header class="hero-section" style="text-align: center; padding: 40px 20px;">
    <div class="container-hero">
        <img src="{{ '/assets/gc_banner.png' | relative_url }}" alt="Logo" id="site-logo" class="site-logo" style="max-height: 150px; width: auto;">
        <p id="flavor-text" class="flavor-text" style="color: var(--sw-yellow); font-style: italic; margin-top: 15px;">
            Select a frequency to begin decryption.
        </p>
    </div>
</header>

<main> 
    {{ content }}
</main>

<footer style="margin-top: 80px; padding: 40px 20px; text-align: center; border-top: 1px solid var(--gh-border); font-size: 0.8rem; color: var(--text-muted);">
    <div style="margin-bottom: 15px; display: flex; justify-content: center; gap: 20px;">
        <a href="{{ '/PrivacyPolicy' | relative_url }}" style="color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s;" onmouseover="this.style.borderColor='var(--accent-blue)'" onmouseout="this.style.borderColor='transparent'">Privacy Policy</a>
        <a href="{{ '/TermsofService' | relative_url }}" style="color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s;" onmouseover="this.style.borderColor='var(--accent-blue)'" onmouseout="this.style.borderColor='transparent'">Terms of Service</a>
    </div>
    <p>Logged into Galactic Registry Engine v3.0</p>
    <p>Last Data Sync: {{ site.time | date: "%Y-%m-%d %H:%M:%S" }} UTC</p>
</footer>

<script>
let registryData = null;

function getCampaignSlug() {
    return new URLSearchParams(window.location.search).get('c');
}

async function initNavigation() {
    try {
        const res = await fetch("{{ '/assets/campaign-registry.json' | relative_url }}");
        registryData = await res.json();
        const dropdown = document.getElementById('campaign-dropdown');
        const currentSlug = getCampaignSlug();

        // Populate Dropdown
        Object.keys(registryData.campaigns).forEach(slug => {
            const campaign = registryData.campaigns[slug];
            const opt = document.createElement('option');
            opt.value = slug;
            opt.textContent = campaign.name;
            dropdown.appendChild(opt);
        });

        // Apply context
        if (currentSlug && registryData.campaigns[currentSlug]) {
            applyCampaignContext(currentSlug);
        } else {
            showHubContext();
        }
    } catch (e) {
        console.error("Registry load failed:", e);
    }
}

function applyCampaignContext(slug) {
    const campaign = registryData.campaigns[slug];
    
    // Update the Site Logo dynamically
    const logoImg = document.getElementById('site-logo');
    if (campaign.paths && campaign.paths.logo) {
        // Points to the remote repo logo
        logoImg.src = `${remoteBase}${campaign.paths.logo}`;
    } else {
        // Fallback to default site banner
        logoImg.src = "{{ '/assets/gc_banner.png' | relative_url }}";
    }
    
    // Update Title to Campaign Name
    document.getElementById('nav-brand-text').textContent = campaign.name;
    document.getElementById('nav-brand-text').href = `{{ '/' | relative_url }}?c=${slug}`;
    
    // Update Flavor
    document.getElementById('flavor-text').textContent = campaign.description || "Decrypting narrative stream...";

    // Update Links
    document.getElementById('nav-archives').href = `{{ '/archives' | relative_url }}?c=${slug}`;
    document.getElementById('nav-archives').style.display = 'inline-block';

    const wikiLink = document.getElementById('nav-wiki');
    if (campaign.paths && campaign.paths.wiki) {
        wikiLink.href = campaign.paths.wiki;
        wikiLink.style.display = 'inline-block';
    } else {
        wikiLink.style.display = 'none';
    }
}

function showHubContext() {
    document.getElementById('nav-brand-text').textContent = "Galactic Campaigns";
    document.getElementById('nav-brand-text').href = "{{ '/' | relative_url }}";
    document.querySelectorAll('.campaign-link').forEach(el => el.style.display = 'none');
}

function switchCampaign(slug) {
    if (slug === "hub" || !slug) {
        window.location.href = "{{ '/' | relative_url }}";
    } else {
        window.location.href = `{{ '/' | relative_url }}?c=${slug}`;
    }
}

document.addEventListener("DOMContentLoaded", initNavigation);
</script>

</body>
</html>
