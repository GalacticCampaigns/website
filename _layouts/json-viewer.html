---
layout: default
---

<style>
/* 1. CONTAINER STABILIZATION */
.log-container-json { width: 100%; padding-top: 20px; }

/* 2. SECONDARY FREQUENCY BAR */
.frequency-nav-bar { 
    position: sticky; 
    top: calc(var(--site-nav-height) + var(--log-nav-height)); 
    z-index: 7000; background: var(--secondary-bg);
    border-bottom: 1px solid var(--gh-border); padding: 12px 0;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: none;
}

.freq-container { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 900px; margin: 0 auto; padding: 0 15px; }

.comms-status { 
    width: 100%; padding-bottom: 8px; font-size: 0.6rem; color: var(--sw-yellow); 
    font-family: monospace; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 5px;
}

/* 3. TRANSITIONS */
.channel-transition { 
    display: flex; align-items: center; justify-content: center; 
    margin: 40px 0 20px; padding: 15px; 
    background: rgba(88,166,255,0.05); border: 1px dashed var(--accent-blue); 
    color: var(--accent-blue); font-family: monospace; font-size: 0.75rem; 
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer; 
}
</style>


<header class="frozen-nav">
    <div class="nav-inner">
        <a href="javascript:void(0)" id="back-to-archives" class="toc-open-btn" style="text-decoration: none;">⇠</a>

        <div class="log-breadcrumb">
            <div class="breadcrumb-item chapter-trigger" onclick="toggleChapterList()">
                <span id="active-chapter-name">LOADING...</span>
                <div id="chapter-list-dropdown" class="custom-nav-dropdown"></div>
            </div>
            
            <div class="breadcrumb-item" id="thread-indicator"></div>
        </div>

        <button id="thread-toggle" class="toc-open-btn" onclick="toggleFrequencies()" style="display:none;">📡</button>
    </div>
</header>


<div id="frequency-selector" class="frequency-nav-bar">
    <div class="freq-container" id="freq-buttons-target"></div>
</div>

<div class="log-container-json">
    <div id="viewer-output">{{ content }}</div>
</div>

<script>
// --- 1. GLOBAL STATE ---
let registry = null;
let activeCampaign = null;
let campaignSlug = "";
let fullData = [];
let channelMap = {}; 
let mainChannelId = null;
let remoteBase = "";

// --- 2. INITIALIZATION ---
async function init() {
    try {
        const res = await fetch("{{ '/assets/campaign-registry.json' | relative_url }}");
        registry = await res.json();
        
        const params = new URLSearchParams(window.location.search);
        campaignSlug = params.get('c') || registry.activeCampaign;
        activeCampaign = registry.campaigns[campaignSlug];

        if (!activeCampaign) throw new Error("Unknown Campaign ID.");

        // Path Stabilization for Public Repos
        const cleanPath = activeCampaign.dataPath.replace(/^\.\//, "").replace(/\/$/, "");
        remoteBase = `https://raw.githubusercontent.com/${activeCampaign.repository}/${activeCampaign.branch}/${cleanPath ? cleanPath + '/' : ''}`;
        
        document.getElementById('back-to-archives').href = `{{ '/archives' | relative_url }}?c=${campaignSlug}`;

        // Populate Custom Breadcrumb Dropdown
        const listTarget = document.getElementById('chapter-list-dropdown');
        listTarget.innerHTML = "";
        activeCampaign.logs.forEach(item => {
            const div = document.createElement('div');
            div.className = "chapter-option";
            div.textContent = item.title;
            div.onclick = (e) => {
                e.stopPropagation();
                toggleChapterList();
                loadChapter(item.channelID);
            };
            listTarget.appendChild(div);
        });

        // Hash Resolution (Deep Linking for Chapters or Threads)
        const hash = window.location.hash.substring(1);
        const hashParts = hash.split(':');
        let chanId = hashParts[0];
        let msgId = hashParts[1] || null;
        let autoFilter = null;

        if (chanId) {
            let entry = activeCampaign.logs.find(m => m.channelID === chanId);
            if (!entry) {
                // Check if the ID provided is actually a Thread ID
                entry = activeCampaign.logs.find(l => l.threads && l.threads.some(t => t.threadID === chanId));
                if (entry) {
                    autoFilter = chanId;
                    msgId = chanId;
                    chanId = entry.channelID;
                }
            }
            if (entry) {
                await loadChapter(chanId, msgId, autoFilter); 
                return;
            }
        }

        if (activeCampaign.logs.length > 0) {
            loadChapter(activeCampaign.logs[0].channelID);
        }
    } catch (e) {
        console.error("Init Error:", e);
        document.getElementById('viewer-output').innerHTML = `<b style="color:red">COMMS ERROR: ${e.message}</b>`;
    }
}

// --- 3. DATA LOADING ---
async function loadChapter(channelID, targetMsg = null, autoFilter = null) {
    const logEntry = activeCampaign.logs.find(l => l.channelID === channelID);
    if (!logEntry) return;

    const jsonUrl = `${remoteBase}${activeCampaign.paths.json}${logEntry.fileName}`;
    const output = document.getElementById('viewer-output');
    output.innerHTML = "<em>Decrypting Data Stream...</em>";

    try {
        const response = await fetch(jsonUrl);
        const data = await response.json();
        fullData = Array.isArray(data) ? data : (data.messages || []);
        fullData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        // Set Chapter Title in Breadcrumb
        updateBreadcrumb(logEntry.title);

        // Map Threads & Frequencies
        channelMap = {};
        let parentCounts = {};
        fullData.forEach(m => {
            if (m.thread) {
                channelMap[m.thread.id] = m.thread.name.toUpperCase();
                if (m.thread.parent_id) parentCounts[m.thread.parent_id] = (parentCounts[m.thread.parent_id] || 0) + 1;
            }
        });

        // Resolve Primary Channel
        mainChannelId = Object.keys(parentCounts).reduce((a, b) => parentCounts[a] > parentCounts[b] ? a : b, null) || channelID;

        buildFrequencyBar();
        renderFeed(autoFilter || 'all');

        if (targetMsg) {
            requestAnimationFrame(() => setTimeout(() => jumpToMessage(targetMsg), 400));
        } else {
            window.scrollTo(0, 0);
        }
    } catch (err) {
        output.innerHTML = `<b style="color:red">DATA CORRUPTION: ${err.message}</b>`;
    }
}

// --- 4. RENDERING ENGINE ---
function renderFeed(filterId) {
    const output = document.getElementById('viewer-output');
    output.innerHTML = "";
    let lastChannelId = null;

    // Update Breadcrumb with Thread Name if filtering
    const logEntry = activeCampaign.logs.find(l => l.channelID === mainChannelId) || activeCampaign.logs[0];
    updateBreadcrumb(logEntry.title, filterId !== 'all' ? channelMap[filterId] : null);

    const validTypes = [0, 19];
    const filtered = fullData.filter(m => validTypes.includes(m.type));
    const messages = filterId === 'all' ? filtered : filtered.filter(m => m.channel_id === filterId || (m.thread && m.thread.id === filterId));

    // Update History Hash
    const hash = filterId === 'all' ? mainChannelId : filterId;
    history.replaceState(null, null, `?c=${campaignSlug}#${hash}`);

    messages.forEach(msg => {
        const isThreadStarter = (msg.thread && msg.thread.id === mainChannelId);
        const actualChannel = isThreadStarter ? msg.thread.id : msg.channel_id;

        // Visual "Frequency Shift" indicators
        if (filterId === 'all' && lastChannelId !== null && actualChannel !== lastChannelId && !isThreadStarter) {
            const shiftName = channelMap[actualChannel] || "PRIMARY FREQUENCY";
            const transition = document.createElement('div');
            transition.className = 'channel-transition';
            transition.innerHTML = `📡 FREQUENCY SHIFT >> ${shiftName}`;
            transition.onclick = () => { renderFeed(actualChannel); window.scrollTo(0,0); };
            output.appendChild(transition);
        }
        if (!isThreadStarter) lastChannelId = actualChannel;

        const group = document.createElement('div');
        group.className = 'message-group';
        group.id = `msg-${msg.id}`;

        const logRef = activeCampaign.logs.find(l => l.channelID === msg.channel_id) || 
                       activeCampaign.logs.find(l => l.threads.some(t => t.threadID === msg.channel_id));

        const avatarUrl = msg.author.avatar 
            ? `${remoteBase}${activeCampaign.paths.avatars}${msg.author.id}/${msg.author.avatar}.png` 
            : `${remoteBase}${activeCampaign.paths.avatars}default.png`;

        group.innerHTML = `
            <div class="avatar-container">
                <img src="" data-src="${avatarUrl}" class="avatar lazy-load">
            </div>
            <div class="msg-body">
                <div class="msg-header">
                    <span class="username">${msg.author.nickname || msg.author.global_name || msg.author.username}</span>
                    <span class="timestamp">${new Date(msg.timestamp).toLocaleString()}</span>
                    <a href="javascript:void(0)" class="copy-link-icon" onclick="copyMsgLink(event, '${msg.id}', '${actualChannel}')">🔗</a>
                </div>
                <div class="msg-content">${parseMarkdown(msg.content)}</div>
                ${renderAttachments(msg, logRef)} 
            </div>
        `;
        output.appendChild(group);
    });
    silentLoadAvatars();
}

// --- 5. MARKDOWN & LINK RESOLUTION ---
function parseMarkdown(text) {
    if (!text) return "";
    let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const emojiBase = `${remoteBase}${activeCampaign.paths.emoji}`;

    return html
        .replace(/&lt;a?(:.*?:)(\d+)&gt;/g, (m, name, id) => `<img src="${emojiBase}!${name.replace(/:/g,'')}!_${id}.png" class="emoji">`)
        .replace(/(?:&lt;#(\d+)&gt;|https?:\/\/discord\.com\/channels\/\d+\/(\d+)(?:\/(\d+))?)/g, (match, mentionId, urlChanId, urlMsgId) => {
            const id = mentionId || urlChanId;
            const res = resolveInternalLinkData(id);
            if (res.found) {
                const href = `{{ '/logs' | relative_url }}?c=${res.slug}#${res.parentId}:${urlMsgId || id}`;
                return `<a href="${href}" class="channel-link"># ${res.isExternal ? res.campaignName + ' > ' : ''}${res.locationName}</a>`;
            }
            return match;
        })
        /* FIXED: Bracketed URL Regex */
        .replace(/\[([^\]]+)\]\((?:&lt;)?(https?:\/\/[^\s&gt;\)]+)(?:&gt;)?\)/g, '<a href="$2" target="_blank" class="external-link">$1</a>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>').replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/`(.*?)`/g, '<code>$1</code>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\|\|(.*?)\|\|/g, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>')
        .replace(/\n/g, '<br>');
}

function resolveInternalLinkData(id) {
    for (let slug in registry.campaigns) {
        const camp = registry.campaigns[slug];
        const chapter = camp.logs.find(l => l.channelID === id);
        if (chapter) return { found: true, slug: slug, parentId: id, locationName: chapter.title, campaignName: camp.name, isExternal: (slug !== campaignSlug) };
        const logWithThread = camp.logs.find(l => l.threads.some(t => t.threadID === id));
        if (logWithThread) {
            const thread = logWithThread.threads.find(t => t.threadID === id);
            return { found: true, slug: slug, parentId: logWithThread.channelID, locationName: `${logWithThread.title} > ${thread.displayName}`, campaignName: camp.name, isExternal: (slug !== campaignSlug) };
        }
    }
    return { found: false };
}

// --- 6. UI HELPERS (Breadcrumb & Nav) ---
function updateBreadcrumb(chapterTitle, threadTitle = null) {
    const chapEl = document.getElementById('active-chapter-name');
    const threadEl = document.getElementById('thread-indicator');
    
    if (chapEl) {
        // Wrap in a span to allow for specific hover styling if needed
        chapEl.innerHTML = `${chapterTitle.toUpperCase()} <span style="font-size: 0.7em; opacity: 0.5; margin-left: 5px;">▼</span>`;
    }
    
    if (threadEl) {
        if (threadTitle) {
            threadEl.style.display = 'flex';
            // We only add ONE arrow here, and it only appears if threadTitle exists
            threadEl.innerHTML = `<span class="nav-arrow">❯</span><span>${threadTitle.toUpperCase()}</span>`;
        } else {
            // Completely hide and empty the element when no thread is selected
            threadEl.style.display = 'none';
            threadEl.innerHTML = '';
        }
    }
}

function toggleChapterList() {
    const dropdown = document.getElementById('chapter-list-dropdown');
    if (dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
}

function buildFrequencyBar() {
    const bar = document.getElementById('frequency-selector');
    const target = document.getElementById('freq-buttons-target');
    const toggleBtn = document.getElementById('thread-toggle');
    const uniqueChannels = [...new Set(fullData.map(m => m.channel_id))].filter(id => id !== mainChannelId);

    if (uniqueChannels.length === 0) { 
        if (bar) bar.style.display = 'none'; 
        if (toggleBtn) toggleBtn.style.display = 'none'; 
        return; 
    }

    if (toggleBtn) toggleBtn.style.display = 'block';
    let html = `<div class="comms-status">📡 Encrypted Frequencies:</div>`;
    html += `<button class="freq-btn" onclick="renderFeed('all')">COMBINED</button>`;
    uniqueChannels.forEach(id => {
        html += `<button class="freq-btn" onclick="renderFeed('${id}')">${channelMap[id] || "SUB-CHANNEL"}</button>`;
    });
    if (target) target.innerHTML = html;
}

function toggleFrequencies() {
    const bar = document.getElementById('frequency-selector');
    if (bar) bar.style.display = (bar.style.display === 'none' || bar.style.display === '') ? 'block' : 'none';
}

// --- 7. UTILITIES ---
function renderAttachments(msg, logRef) {
    if (!msg.attachments || msg.attachments.length === 0 || !logRef) return "";
    const folder = logRef.fileName.replace('.json', '');
    let html = '<div class="msg-attachments">';
    msg.attachments.forEach(att => {
        const src = `${remoteBase}${activeCampaign.paths.media}${folder}/${att.filename}`;
        if (att.content_type && att.content_type.startsWith('image/')) {
            html += `<div class="attachment-item"><a href="${src}" target="_blank"><img src="${src}" class="log-image" loading="lazy"></a></div>`;
        } else {
            html += `<div class="attachment-item"><a href="${src}" target="_blank" class="file-link">📄 ${att.filename}</a></div>`;
        }
    });
    return html + '</div>';
}

function jumpToMessage(msgId) {
    const cleanId = msgId.startsWith('msg-') ? msgId : `msg-${msgId}`;
    const target = document.getElementById(cleanId);
    if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.classList.add('highlight-flash');
        setTimeout(() => target.classList.remove('highlight-flash'), 3000);
    }
}

function silentLoadAvatars() {
    document.querySelectorAll('.lazy-load').forEach(img => {
        const src = img.getAttribute('data-src');
        const probe = new Image();
        probe.src = src;
        probe.onload = () => { img.src = src; img.classList.add('loaded'); };
        probe.onerror = () => { img.src = `${remoteBase}${activeCampaign.paths.avatars}default.png`; img.classList.add('loaded'); };
    });
}

function copyMsgLink(event, msgId, actualChannel) {
    event.preventDefault();
    const url = `${window.location.origin}${window.location.pathname}?c=${campaignSlug}#${actualChannel}:${msgId}`;
    navigator.clipboard.writeText(url).then(() => {
        const icon = event.target;
        icon.innerText = "COPIED";
        setTimeout(() => icon.innerText = "🔗", 1500);
    });
}

// Global click listener to close the custom dropdown
window.onclick = (e) => {
    if (!e.target.closest('.chapter-trigger')) {
        const d = document.getElementById('chapter-list-dropdown');
        if (d) d.style.display = 'none';
    }
};

document.addEventListener("DOMContentLoaded", init);
</script>
