<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Galactic Campaigns</title>
    <link rel="icon" type="image/png" href="{{ '/assets/gc_logo.png' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}"> 

<style>
/* 1. BRANDING & SECRET SELECTOR */
.campaign-selector-wrapper { display: flex; align-items: center; position: relative; }
.nav-brand {
    font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase;
    color: var(--accent-blue) !important; text-decoration: none; transition: 0.3s;
}
.selector-container { position: relative; display: inline-flex; align-items: center; margin-left: 8px; }
#campaign-dropdown { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
.selector-arrow { color: var(--sw-yellow); font-size: 0.8rem; pointer-events: none; z-index: 1; transition: 0.2s; }

/* 2. HERO SECTION */
.hero-section {
    text-align: center; padding: 60px 20px; border-bottom: 1px solid var(--gh-border);
    background: radial-gradient(circle at center, rgba(13, 17, 23, 0.5) 0%, var(--primary-bg) 100%);
}
.site-logo { max-height: 150px; filter: drop-shadow(0 0 20px rgba(97, 218, 251, 0.15)); }
.flavor-text { color: var(--sw-yellow); font-style: italic; margin-top: 20px; font-family: monospace; font-size: 0.85rem; }

/* 3. FOOTER SPECIFIC STYLES */
.nsfw-toggle-container { margin-top: 20px; }
#nsfw-toggle-btn {
    background: transparent; border: 1px solid var(--gh-border); color: var(--text-muted);
    padding: 6px 12px; font-family: monospace; font-size: 0.75rem; cursor: pointer;
    transition: all 0.3s; border-radius: 4px; text-transform: uppercase;
}
#nsfw-toggle-btn:hover { border-color: var(--sw-yellow); color: var(--sw-yellow); }
#nsfw-toggle-btn.active { border-color: #ff4444; color: #ff4444; box-shadow: 0 0 10px rgba(255, 68, 68, 0.2); }

/* 4. DISCORD BADGE & FOOTER LINKS */
.footer-link-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.discord-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(88, 101, 242, 0.1);
    border: 1px solid #5865F2;
    color: #5865F2 !important;
    border-radius: 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    text-decoration: none;
}

.discord-badge:hover {
    background: #5865F2;
    color: white !important;
    box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
    transform: translateY(-2px);
}

.discord-icon {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

@media (max-width: 900px) {
    .hero-section { padding: 40px 15px; }
    .site-logo { max-height: 100px; }
}
</style>

</head>
<body class="mode-sfw"> <div class="comms-hud">
    <button class="hud-btn" id="hud-return" title="Return to Position" onclick="returnToPosition()" style="display:none;">↩</button>
    <button class="hud-btn" onclick="jumpToTop()" title="Jump to Top">▲</button>
    <button class="hud-btn" onclick="jumpToBottom()" title="Jump to Bottom">▼</button>
</div>

<nav class="site-nav">
    <div class="nav-inner" style="display:flex; width:100%; align-items:center; justify-content: space-between;">
        
        <div class="campaign-selector-wrapper">
            <a href="{{ '/' | relative_url }}" id="nav-brand-text" class="nav-brand">Galactic Campaigns</a>
            
            <div class="selector-container">
                <select id="campaign-dropdown" onchange="switchCampaign(this.value)">
                    <option value="" disabled selected></option>
                    <option value="hub">-- Global Hub --</option>
                </select>
                <span class="selector-arrow">▼</span>
            </div>
        </div>

        <div class="nav-links" id="dynamic-nav-links">
            <a href="{{ '/' | relative_url }}" id="hub-home">Home</a>
            <a href="#" id="nav-archives" class="campaign-link">Archives</a>
            <a href="#" id="nav-wiki" class="campaign-link" target="_blank">Wiki</a>
        </div>
    </div>
</nav>

<header class="hero-section">
    <div class="container-hero">
        <img src="{{ '/assets/gc_banner.png' | relative_url }}" alt="Logo" id="site-logo" class="site-logo">
        <p id="flavor-text" class="flavor-text">
            Select a frequency to begin decryption.
        </p>
    </div>
</header>

<main> 
    {{ content }}
</main>

<footer class="site-footer" style="margin-top: 80px; padding: 40px 20px; text-align: center; border-top: 1px solid var(--gh-border); font-size: 0.8rem; color: var(--text-muted);">
    
    <div class="footer-link-row">        
        <a href="https://discord.gg/8N2Rzjrk2n" target="_blank" class="discord-badge">
            <svg class="discord-icon" viewBox="0 0 24 24">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.862-1.297 1.2-1.99a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            Join the Frequency
        </a>
        <a href="{{ '/PrivacyPolicy' | relative_url }}" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a>       
        <a href="{{ '/TermsofService' | relative_url }}" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
    </div>

    <div class="nsfw-toggle-container">
        <button id="nsfw-toggle-btn" onclick="toggleNSFW()">FILTER: ON (SECURE)</button>
    </div>

    <p style="margin-top:20px;">Logged into Galactic Registry Engine v3.0</p>
    <p>Last Data Sync: {{ site.time | date: "%Y-%m-%d %H:%M:%S" }} UTC</p>
</footer>

<script>
    window.site_baseurl = "{{ '' | relative_url }}";
</script>
<script src="{{ '/assets/js/navigation.js' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}"></script>
<script>
function switchCampaign(slug) {
    const url = (slug === "hub" || !slug) ? window.site_baseurl + "/" : window.site_baseurl + "/?c=" + slug;
    window.location.href = url;
}
</script>

</body>
</html>
