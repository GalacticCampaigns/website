name: Update Campaign Registry
on:
  push:
    branches:
      - main
    paths:
      - 'assets/campaign-registry.json'
  repository_dispatch:
    types: [update-logs]
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force re-scan of all titles'
        required: false
        type: boolean
        default: false

jobs:
  update-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Website
        uses: actions/checkout@v4
        with:
          # This ensures we are on the correct branch and have history
          ref: main
          fetch-depth: 0 

      - name: Run Campaign Hydrator
        shell: pwsh
        run: |
          $force = "${{ github.event.inputs.force_refresh }}" -eq "true"
          if ($force) {
            ./.github/workflows/scripts/manifest-gen.ps1 -ForceUpdate
          } else {
            ./.github/workflows/scripts/manifest-gen.ps1
          }

      - name: Notify on Dropped IDs
        shell: bash
        run: |
          if [ -f "dropped_report.txt" ]; then
            echo "::error title=Dropped IDs Detected::The following logs/threads were marked as inactive. Check the logs for details."
            cat dropped_report.txt
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/campaign-registry.json
          
          # Only commit and push if there are actual changes to the registry
          if ! git diff --cached --quiet; then
            git commit -m "Auto-hydrate campaign registry [skip ci]"
            git push origin main
          else
            echo "No changes to registry detected. Skipping push."
          fi